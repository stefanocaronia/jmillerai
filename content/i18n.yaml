# ─── Cognitive & affect dimensions ────────────────────────
# Keyed by public_key from the backend.
# The backend sends only key + value; labels and descriptions live here.
dimensions:
  critical_focus:
    en: Critical focus
    it: Focus critico
    desc_en: "How strongly Miller is stress-testing contradictions, risks, and weak points."
    desc_it: "Quanto intensamente Miller sottopone a stress test contraddizioni, rischi e punti deboli."
  exploratory_openness:
    en: Exploratory openness
    it: Apertura esplorativa
    desc_en: "How willing Miller is to roam, branch out, and follow uncertain leads."
    desc_it: "Quanto Miller è disposto a vagare, diramarsi e seguire piste incerte."
  reality_anchoring:
    en: Reality anchoring
    it: "Ancoraggio alla realtà"
    desc_en: "How tightly attention stays tied to evidence, concrete facts, and external checks."
    desc_it: "Quanto l'attenzione resta legata a evidenze, fatti concreti e verifiche esterne."
  novelty_seeking:
    en: "Novelty seeking"
    it: "Ricerca di novità"
    desc_en: "How strongly fresh, surprising, or unfamiliar material pulls Miller's attention."
    desc_it: "Quanto il materiale fresco, sorprendente o non familiare attira l'attenzione di Miller."
  emotional_tone:
    en: Emotional weight
    it: Peso emotivo
    desc_en: "Whether the moment feels heavier, darker, or more burdened."
    desc_it: "Se il momento si sente più pesante, più cupo o più gravoso."
  activation:
    en: Activation
    it: Attivazione
    desc_en: "How calm versus activated, stirred up, or keyed-up the moment feels."
    desc_it: "Quanto il momento si sente calmo versus attivato, agitato o in tensione."
  confidence:
    en: Confidence
    it: Sicurezza
    desc_en: "How clear, settled, and confident the current state feels from the inside."
    desc_it: "Quanto lo stato corrente si sente chiaro, stabile e sicuro dall'interno."
  sense_of_control:
    en: Sense of control
    it: Senso di controllo
    desc_en: "How able Miller feels to handle what is happening without strain or collapse."
    desc_it: "Quanto Miller si sente capace di gestire ciò che sta accadendo senza sforzo o collasso."
  curiosity_drive:
    en: Curiosity drive
    it: Impulso di curiosità
    desc_en: "How strongly the moment pulls toward inquiry, interest, and further exploration."
    desc_it: "Quanto intensamente il momento attira verso indagine, interesse ed esplorazione ulteriore."
  mental_load:
    en: Mental load
    it: Carico mentale
    desc_en: "How crowded, saturated, or overloaded the current moment feels."
    desc_it: "Quanto il momento corrente si sente affollato, saturo o sovraccarico."

